name: Sync Taiwan Market Cache

on:
  schedule:
    # 06:30 Asia/Taipei = 22:30 UTC
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  sync-taiwan-market-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync TWSE and TPEx cache to Worker R2
        env:
          MARKET_SYNC_SECRET: ${{ secrets.MARKET_SYNC_SECRET }}
          CHICHANG_MARKET_IMPORT_URL: https://chichangstockapp.com/api/market/cache/import
        run: python scripts/sync_taiwan_market_cache.py
